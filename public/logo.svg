<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gnc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ddc84"/>
      <stop offset="100%" stop-color="#2bb86e"/>
    </linearGradient>
    <radialGradient id="fnc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="55%" stop-color="white"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="mnc">
      <rect width="200" height="200" fill="url(#fnc)"/>
    </mask>
  </defs>
  <rect width="200" height="200" rx="28" fill="#090909"/>
  <g mask="url(#mnc)">
    <!-- All same direction but full S-curve (2 waves per strand) so corners balance -->
    <!-- Each strand does: up, down, up — enters and exits at the same y -->
    <!-- ±16px amplitude per half-wave -->

    <!-- Horizontal -->
    <path d="M28,40 Q55,24 100,40 Q145,56 172,40" stroke="url(#gnc)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M28,80 Q55,64 100,80 Q145,96 172,80" stroke="url(#gnc)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M28,120 Q55,104 100,120 Q145,136 172,120" stroke="url(#gnc)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M28,160 Q55,144 100,160 Q145,176 172,160" stroke="url(#gnc)" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Vertical -->
    <path d="M40,28 Q24,55 40,100 Q56,145 40,172" stroke="url(#gnc)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M80,28 Q64,55 80,100 Q96,145 80,172" stroke="url(#gnc)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M120,28 Q104,55 120,100 Q136,145 120,172" stroke="url(#gnc)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M160,28 Q144,55 160,100 Q176,145 160,172" stroke="url(#gnc)" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>