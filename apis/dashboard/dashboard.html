<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APIMesh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0a0a0a;
        color: #ededed;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
        line-height: 1.5;
      }

      a { color: #ededed; text-decoration: none; }
      a:hover { color: #fff; }

      /* --- Login --- */
      #login {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease;
      }
      #login.hidden { opacity: 0; pointer-events: none; }

      .login-box {
        width: 320px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .login-box h1 {
        font-size: 16px;
        font-weight: 600;
        color: #ededed;
        margin-bottom: 8px;
      }
      .login-box input {
        width: 100%;
        padding: 10px 12px;
        background: #0a0a0a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #ededed;
        font-family: inherit;
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s;
      }
      .login-box input:focus { border-color: #ededed; }
      .login-box input::placeholder { color: #666; }

      .btn {
        padding: 10px 16px;
        background: #ededed;
        color: #0a0a0a;
        border: none;
        border-radius: 6px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn:hover { background: #fff; }
      .btn-ghost {
        background: transparent;
        color: #666;
        border: 1px solid #333;
        padding: 6px 12px;
        font-size: 13px;
      }
      .btn-ghost:hover { color: #ededed; border-color: #555; background: transparent; }

      #login-error { color: #e5484d; font-size: 13px; min-height: 18px; }

      /* --- Shell --- */
      #dashboard {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 64px;
      }
      #dashboard.active { opacity: 1; visibility: visible; }

      /* --- Header --- */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 24px;
        border-bottom: 1px solid #1a1a1a;
        margin-bottom: 32px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header-left h1 { font-size: 14px; font-weight: 600; }
      .header-left .sep { color: #333; }
      .header-left .env {
        font-size: 12px;
        color: #666;
        padding: 2px 8px;
        border: 1px solid #222;
        border-radius: 4px;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header-right .meta {
        font-size: 12px;
        color: #555;
      }

      /* Toggle */
      .toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 12px;
        color: #666;
        user-select: none;
      }
      .toggle input { display: none; }
      .toggle-track {
        width: 28px;
        height: 16px;
        background: #333;
        border-radius: 8px;
        position: relative;
        transition: background 0.15s;
      }
      .toggle-knob {
        width: 12px;
        height: 12px;
        background: #666;
        border-radius: 50%;
        position: absolute;
        top: 2px;
        left: 2px;
        transition: transform 0.15s, background 0.15s;
      }
      .toggle input:checked + .toggle-track { background: #333; }
      .toggle input:checked + .toggle-track .toggle-knob {
        transform: translateX(12px);
        background: #ededed;
      }

      /* --- Cards --- */
      .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: #1a1a1a;
        border: 1px solid #1a1a1a;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 32px;
      }
      .card {
        background: #0a0a0a;
        padding: 20px;
      }
      .card-label {
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
      }
      .card-row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
      }
      .card-value {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.5px;
        color: #ededed;
        white-space: nowrap;
      }
      .card-spark {
        width: 80px;
        height: 28px;
        flex-shrink: 0;
      }
      .card-spark svg { width: 100%; height: 100%; }

      /* --- Chart Section --- */
      .chart-section {
        margin-bottom: 32px;
      }
      .chart-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .chart-section-title {
        font-size: 13px;
        font-weight: 500;
        color: #ededed;
      }
      .chart-section-sub {
        font-size: 12px;
        color: #555;
      }
      .chart-container {
        border: 1px solid #1a1a1a;
        border-radius: 8px;
        padding: 20px 20px 12px;
        background: #0a0a0a;
      }
      .chart-area {
        width: 100%;
        height: 140px;
      }
      .chart-area svg { width: 100%; height: 100%; display: block; }

      /* --- Two column layout --- */
      .cols {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 24px;
        margin-bottom: 32px;
      }

      /* --- Tables --- */
      .panel {
        border: 1px solid #1a1a1a;
        border-radius: 8px;
        overflow: hidden;
      }
      .panel-header {
        padding: 14px 16px;
        border-bottom: 1px solid #1a1a1a;
        font-size: 13px;
        font-weight: 500;
        color: #ededed;
      }

      table { width: 100%; border-collapse: collapse; }
      th {
        text-align: left;
        padding: 10px 16px;
        font-size: 12px;
        font-weight: 500;
        color: #555;
        border-bottom: 1px solid #1a1a1a;
      }
      td {
        padding: 10px 16px;
        font-size: 13px;
        color: #999;
        border-bottom: 1px solid #111;
      }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: #111; }

      td.primary { color: #ededed; font-weight: 500; }
      td.mono { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }
      td.green { color: #3ddc84; }
      td.dim { color: #555; }
      td.red { color: #e5484d; }

      .badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
      }
      .badge-ok { background: #062312; color: #3ddc84; }
      .badge-paid { background: #0d1b2a; color: #52a8ff; }
      .badge-free { color: #555; }

      /* --- Breakdown --- */
      .breakdown { padding: 4px 0; }
      .breakdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
      }
      .breakdown-item + .breakdown-item { border-top: 1px solid #111; }
      .breakdown-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .breakdown-name {
        font-size: 13px;
        color: #999;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .breakdown-val {
        font-size: 13px;
        color: #ededed;
        font-weight: 500;
        font-family: "SF Mono", "Fira Code", monospace;
        white-space: nowrap;
      }

      .empty-state {
        padding: 32px 16px;
        text-align: center;
        color: #444;
        font-size: 13px;
      }

      .loading-row td {
        color: #333;
        text-align: center;
        padding: 32px;
      }

      /* --- Responsive --- */
      @media (max-width: 900px) {
        .cards { grid-template-columns: repeat(2, 1fr); }
        .cols { grid-template-columns: 1fr; }
      }
      @media (max-width: 560px) {
        .cards { grid-template-columns: 1fr; }
        .header { flex-direction: column; align-items: flex-start; gap: 12px; }
        .header-right { width: 100%; justify-content: space-between; }
      }
    </style>
  </head>
  <body>
    <div id="login">
      <div class="login-box">
        <h1>APIMesh</h1>
        <input type="password" id="token-input" placeholder="Token" autocomplete="off" />
        <button class="btn" id="login-btn">Log in</button>
        <div id="login-error"></div>
      </div>
    </div>

    <div id="dashboard">
      <div class="header">
        <div class="header-left">
          <h1>APIMesh</h1>
          <span class="sep">/</span>
          <span class="env">production</span>
        </div>
        <div class="header-right">
          <span class="meta" id="wallet"></span>
          <label class="toggle">
            <input type="checkbox" id="auto-refresh" checked />
            <div class="toggle-track"><div class="toggle-knob"></div></div>
            Live
          </label>
          <span class="meta" id="last-updated"></span>
          <button class="btn-ghost" id="logout-btn">Log out</button>
        </div>
      </div>

      <div class="cards">
        <div class="card">
          <div class="card-label">Revenue (7d)</div>
          <div class="card-row">
            <div class="card-value" id="rev-7d">&mdash;</div>
            <div class="card-spark" id="spark-rev"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-label">Revenue (30d)</div>
          <div class="card-row">
            <div class="card-value" id="rev-30d">&mdash;</div>
            <div class="card-spark" id="spark-rev-30"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-label">APIs</div>
          <div class="card-row">
            <div class="card-value" id="active-apis">&mdash;</div>
          </div>
        </div>
        <div class="card">
          <div class="card-label">Requests (7d)</div>
          <div class="card-row">
            <div class="card-value" id="total-requests">&mdash;</div>
            <div class="card-spark" id="spark-req"></div>
          </div>
        </div>
      </div>

      <div class="chart-section">
        <div class="chart-section-header">
          <span class="chart-section-title">Requests</span>
          <span class="chart-section-sub">Last 24h</span>
        </div>
        <div class="chart-container">
          <div class="chart-area" id="chart-hourly"></div>
        </div>
      </div>

      <div class="cols">
        <div class="panel">
          <div class="panel-header">APIs</div>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Requests</th>
                <th>Errors</th>
                <th>Revenue</th>
              </tr>
            </thead>
            <tbody id="apis-table">
              <tr><td colspan="4" class="loading-row">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="panel">
          <div class="panel-header">Revenue by API</div>
          <div class="breakdown" id="api-breakdown">
            <div class="empty-state">No data</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Recent requests</div>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>API</th>
              <th>Endpoint</th>
              <th>Status</th>
              <th>Latency</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody id="requests-table">
            <tr><td colspan="6" class="loading-row">Waiting...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      var B = location.origin, ri = null;

      function gt() { return sessionStorage.getItem("t"); }
      function st(t) { sessionStorage.setItem("t", t); }
      function ct() { sessionStorage.removeItem("t"); }

      async function login() {
        var inp = document.getElementById("token-input");
        var err = document.getElementById("login-error");
        var tok = inp.value.trim();
        if (!tok) { err.textContent = "Token required"; return; }
        try {
          var res = await fetch(B + "/api/stats", { headers: { Authorization: "Bearer " + tok } });
          if (res.status === 401) { err.textContent = "Invalid token"; return; }
          if (!res.ok) { err.textContent = "Error " + res.status; return; }
          st(tok); inp.value = ""; err.textContent = "";
          show(); render(await res.json());
        } catch(e) { err.textContent = "Network error"; }
      }

      document.getElementById("token-input").addEventListener("keydown", function(e) { if (e.key === "Enter") login(); });
      document.getElementById("login-btn").addEventListener("click", login);
      document.getElementById("logout-btn").addEventListener("click", logout);

      function logout() {
        ct(); stopR();
        document.getElementById("login").classList.remove("hidden");
        document.getElementById("dashboard").classList.remove("active");
      }

      function show() {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("dashboard").classList.add("active");
        startR();
      }

      function startR() { stopR(); if (document.getElementById("auto-refresh").checked) ri = setInterval(load, 10000); }
      function stopR() { if (ri) { clearInterval(ri); ri = null; } }
      document.getElementById("auto-refresh").addEventListener("change", function() {
        if (this.checked) startR(); else stopR();
      });

      async function load() {
        var tok = gt(); if (!tok) return;
        try {
          var res = await fetch(B + "/api/stats", { headers: { Authorization: "Bearer " + tok } });
          if (res.status === 401) { logout(); return; }
          if (!res.ok) return;
          render(await res.json());
        } catch(e) {}
      }

      function fmt$(v) { return "$" + Number(v || 0).toFixed(4); }
      function fmtN(v) { return Number(v || 0).toLocaleString(); }
      function fmtPct(v) { return (Number(v || 0) * 100).toFixed(1) + "%"; }
      function fmtTime(iso) {
        if (!iso) return "--";
        var s = iso.includes("T") ? iso : iso.replace(" ", "T") + "Z";
        var d = new Date(s);
        if (isNaN(d)) return "--";
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }
      function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

      // --- SVG ---
      function sparkline(el, data, color) {
        if (!data || !data.length) { el.innerHTML = ""; return; }
        var w = 80, h = 28, max = Math.max.apply(null, data.concat([0.001]));
        var pts = data.map(function(v, i) {
          return [(i / Math.max(data.length - 1, 1)) * w, h - (v / max) * (h - 2) - 1];
        });
        var d = pts.map(function(p, i) { return (i ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1); }).join("");
        el.innerHTML = '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
          '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }

      function barChart(el, labels, vals) {
        if (!vals || !vals.length) { el.innerHTML = '<div class="empty-state">No data</div>'; return; }
        var w = 700, h = 120, max = Math.max.apply(null, vals.concat([1]));
        var bw = Math.max(2, w / vals.length - 1.5);
        var svg = '';

        // Gridlines
        for (var g = 0; g <= 3; g++) {
          var gy = (h / 3) * g;
          svg += '<line x1="0" y1="' + gy.toFixed(1) + '" x2="' + w + '" y2="' + gy.toFixed(1) + '" stroke="#1a1a1a" stroke-width="1"/>';
        }

        // Bars
        for (var i = 0; i < vals.length; i++) {
          var bh = (vals[i] / max) * (h - 4);
          var x = (i / vals.length) * w;
          var y = h - bh;
          svg += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + bh.toFixed(1) + '" rx="1" fill="#333"/>';
        }

        // X labels
        var step = Math.max(1, Math.floor(vals.length / 6));
        for (var j = 0; j < labels.length; j += step) {
          var lx = (j / vals.length) * w + bw / 2;
          svg += '<text x="' + lx.toFixed(1) + '" y="' + (h + 14) + '" fill="#444" font-size="10" font-family="Inter,sans-serif" text-anchor="middle">' + esc(labels[j]) + '</text>';
        }

        el.innerHTML = '<svg viewBox="0 0 ' + w + ' ' + (h + 18) + '" preserveAspectRatio="none">' + svg + '</svg>';
      }

      function breakdown(el, items) {
        if (!items || !items.length) { el.innerHTML = '<div class="empty-state">No revenue data</div>'; return; }
        var colors = ["#ededed", "#999", "#666", "#555", "#444", "#333"];
        el.innerHTML = items.slice(0, 8).map(function(item, i) {
          return '<div class="breakdown-item">' +
            '<div class="breakdown-dot" style="background:' + colors[i % colors.length] + '"></div>' +
            '<div class="breakdown-name">' + esc(item.api_name) + '</div>' +
            '<div class="breakdown-val">' + fmt$(item.total_usd) + '</div></div>';
        }).join("");
      }

      function render(data) {
        var upd = function(id, v) { document.getElementById(id).textContent = v; };
        upd("rev-7d", fmt$(data.revenue_7d));
        upd("rev-30d", fmt$(data.revenue_30d));
        upd("active-apis", data.apis ? data.apis.length : 0);
        upd("total-requests", fmtN(data.total_requests_7d));

        if (data.wallet) {
          document.getElementById("wallet").textContent = data.wallet.substring(0, 6) + "..." + data.wallet.slice(-4);
          document.getElementById("wallet").title = data.wallet;
        }
        document.getElementById("last-updated").textContent = new Date().toLocaleTimeString();

        // Sparklines
        if (data.charts) {
          sparkline(document.getElementById("spark-rev"), (data.charts.daily_revenue_7d || []).map(function(d) { return d.total_usd; }), "#3ddc84");
          sparkline(document.getElementById("spark-rev-30"), (data.charts.daily_revenue_30d || []).map(function(d) { return d.total_usd; }), "#3ddc84");
          sparkline(document.getElementById("spark-req"), (data.charts.daily_requests_7d || []).map(function(d) { return d.total; }), "#ededed");

          var hourly = data.charts.hourly_requests_24h || [];
          barChart(
            document.getElementById("chart-hourly"),
            hourly.map(function(h) { var p = h.hour.split(" "); return p[1] || h.hour; }),
            hourly.map(function(h) { return h.total; })
          );
        }

        // Revenue breakdown
        breakdown(document.getElementById("api-breakdown"), data.revenue_by_api);

        // APIs table
        var ab = document.getElementById("apis-table");
        if (!data.apis || !data.apis.length) {
          ab.innerHTML = '<tr><td colspan="4" class="empty-state">No APIs</td></tr>';
        } else {
          ab.innerHTML = data.apis.map(function(a) {
            var errColor = a.error_rate_7d && a.error_rate_7d.rate > 0.05 ? ' class="mono red"' : ' class="mono dim"';
            return '<tr>' +
              '<td class="primary"><a href="https://' + esc(a.subdomain) + '.apimesh.xyz" target="_blank">' + esc(a.name) + '</a></td>' +
              '<td class="mono">' + fmtN(a.requests_7d) + '</td>' +
              '<td' + errColor + '>' + fmtPct(a.error_rate_7d ? a.error_rate_7d.rate : 0) + '</td>' +
              '<td class="mono green">' + fmt$(a.revenue_7d) + '</td></tr>';
          }).join("");
        }

        // Recent requests
        var rb = document.getElementById("requests-table");
        if (!data.recent_requests || !data.recent_requests.length) {
          rb.innerHTML = '<tr><td colspan="6" class="empty-state">No events</td></tr>';
        } else {
          rb.innerHTML = data.recent_requests.slice(0, 15).map(function(r) {
            var sc = r.status_code;
            var scClass = sc >= 500 ? "mono red" : sc >= 400 ? "mono" : "mono green";
            return '<tr>' +
              '<td class="mono dim">' + fmtTime(r.created_at) + '</td>' +
              '<td class="primary">' + esc(r.api_name) + '</td>' +
              '<td class="mono dim">' + esc(r.method) + ' ' + esc(r.endpoint) + '</td>' +
              '<td class="' + scClass + '">' + (Number.isFinite(sc) ? sc : "--") + '</td>' +
              '<td class="mono dim">' + (Number.isFinite(r.response_time_ms) ? r.response_time_ms.toFixed(0) + "ms" : "--") + '</td>' +
              '<td>' + (r.paid ? '<span class="badge badge-paid">paid</span>' : '<span class="badge badge-free">free</span>') + '</td></tr>';
          }).join("");
        }
      }

      if (gt()) { show(); load(); }
    </script>
  </body>
</html>
